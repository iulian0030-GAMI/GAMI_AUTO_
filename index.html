
<!DOCTYPE html>
<html lang="ro">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GAMI DRIVE">

<link rel="apple-touch-icon" href="https://iulian0030-gami.github.io/icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAMI AUTO DRIVE - PRO CLOUD</title>
    <style>
        :root {
            --primary: #1e3a8a; --accent: #fbbf24; --success: #22c55e;
            --danger: #ef4444; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b;
        }
       body { 
    font-family: 'Inter', sans-serif; 
    background: var(--bg); 
    margin: 0; 
    color: var(--text); 
    overflow: hidden;   
        #q-text {
    max-height: 150px;
    overflow-y: auto;
}
        .hidden { display: none !important; }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
            100% { transform: translateX(0); }
        }
        .shake-effect { animation: shake 0.3s ease-in-out; }

        .login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1e3a8a 0%, #0f172a 100%); }
        .login-card { background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-style { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #cbd5e1; border-radius: 12px; background: #fff; color: #000; text-align: center; box-sizing: border-box; font-size: 16px; }
        
        .header { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); background: white; border-bottom: 1px solid #cbd5e1; text-align: center; }
        .stat-val { display: block; font-size: 18px; color: var(--primary); font-weight: 800; }
        .stat-label { font-size: 9px; color: #64748b; font-weight: bold; text-transform: uppercase; }

       .q-card { 
    background: var(--card); 
    width: 95%; 
    max-width: 800px; 
    padding: 20px; 
    border-radius: 20px; 
    margin: 15px auto; 
    text-align: center; 
    box-sizing: border-box; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
    border: 1px solid #e2e8f0;

    max-height: calc(100vh - 180px);  
    overflow-y: auto;                
    scrollbar-width: thin;           
}
        .img-container { width: 100%; margin-bottom: 15px; display: none; text-align: center; }
        .img-container img { max-width: 100%; height: auto; border-radius: 12px; border: 3px solid #fbbf24; }
        
        .opt-btn { width: 100%; padding: 16px; margin-bottom: 10px; border: 2px solid #e2e8f0; border-radius: 14px; background: white; color: var(--text); cursor: pointer; text-align: left; font-size: 16px; display: flex; align-items: center; }
        .opt-btn span { font-weight: bold; color: var(--primary); margin-right: 15px; width: 20px; }
        .opt-btn.selected { border-color: var(--accent); background: #fffbeb; }
        .opt-btn.correct { background: var(--success) !important; border-color: #166534 !important; color: white; }
        .opt-btn.wrong { background: var(--danger) !important; border-color: #991b1b !important; color: white; }
        
        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; display: flex; gap: 10px; box-sizing: border-box; border-top: 1px solid #cbd5e1; }
        .btn { padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; flex: 1; text-transform: uppercase; font-size: 11px; }
        .btn-confirm { background: var(--primary); color: white; }

        .admin-card-stu { background: white; color: #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; position: relative; border: 1px solid #e2e8f0; }
        .results-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; justify-content: center; }
        .score-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; cursor: pointer; border: 2px solid transparent; }
        .circle-pass { background: var(--success); color: white; }
        .circle-fail { background: var(--danger); color: white; }
        .gauges-row { display: flex; justify-content: space-around; margin-top: 20px; padding-top: 15px; border-top: 1px solid #e2e8f0; }
        .gauge-visual { width: 50px; height: 50px; border-radius: 50%; border: 4px solid #f1f5f9; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="screen-login" class="login-screen">
    <div id="login-card" class="login-card">
        <h1 style="color:var(--primary)">GAMI DRIVE</h1>
       <input type="text" id="stu-name" placeholder="Cursant / Instructor" class="input-style">
       <input type="password" id="stu-code" placeholder="Cod Acces" class="input-style">
       <input type="password" id="admin-code" placeholder="Admin" class="input-style">
        <button class="btn btn-confirm" style="width:100%" onclick="playClick(); auth()">CONECTARE</button>
    </div>
</div>

<div id="screen-exam" class="hidden">
    <div class="header">
        <div id="user-tag" style="font-weight:bold;">Cursant: -</div>
        <div id="timer" style="color:var(--accent); font-weight:900;">30:00</div>
    </div>
    <div class="stats-grid">
        <div style="padding:10px;"><span class="stat-label">Rămase</span><span class="stat-val" id="s-rem">26</span></div>
        <div style="padding:10px; color:var(--success)"><span class="stat-label">Corecte</span><span class="stat-val" id="s-cor">0</span></div>
        <div style="padding:10px; color:var(--danger)"><span class="stat-label">Greșite</span><span class="stat-val" id="s-gre">0</span></div>
        <div style="padding:10px;"><span class="stat-label">Scor</span><span class="stat-val" id="s-perc">0%</span></div>
    </div>
    <div id="q-card-main" class="q-card">
        <div id="img-wrap" class="img-container"></div>
        <div id="q-text" style="font-size:18px; font-weight:bold; margin-bottom:15px; text-align: left;"></div>
        <div id="opts-list"></div>
    </div>
    <div class="footer">
        <button class="btn" style="background:#fee2e2; color:var(--danger); flex:0.4;" onclick="playClick(); location.reload()">ABANDON</button>
        <button class="btn" style="background:#f1f5f9; color:#475569; border:1px solid #cbd5e1;" onclick="playClick(); later()">MAI TÂRZIU</button>
        <button class="btn btn-confirm" id="btn-main" onclick="playClick(); handleAction()">CONFIRMĂ</button>
    </div>
</div>

<div id="screen-admin" class="hidden" style="padding:20px; padding-bottom:100px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="color:var(--primary); margin:0;">📊 CONTROL PANEL</h2>
        <button class="btn btn-confirm" onclick="addNewAccount()" style="border-radius:50%; width:45px; height:45px; font-size:24px; flex:none;">+</button>
    </div>
    <div id="admin-code-box">
    <div style="background: white; padding: 15px; border-radius: 15px; margin-bottom: 25px; border-left: 4px solid var(--primary); display: flex;">
        <input type="text" id="new-adm-code" placeholder="Cod Nou Admin" class="input-style" style="margin-bottom:0; font-size:12px;">
        <button class="btn btn-confirm" onclick="updateCloudCodes()" style="padding:10px; font-size:10px; flex: 0.6;">SALVEAZĂ</button>
    </div>
</div>
    <div id="admin-grouped-content"></div>
    <button class="btn btn-confirm" style="position:fixed; bottom:20px; left:5%; width:90%; z-index:1000;" onclick="location.reload()">IEȘIRE ADMIN</button>
</div>

<script>
const DB_URL = "https://gamiautodrive-default-rtdb.europe-west1.firebasedatabase.app/";
let initialPool = [], cor = 0, gre = 0, sel = [], examHistory = [], timer, studentName = "", activePool = [], isPaused = false;let qIndex = 0;
let isBoss = false;
let usedGlobal = [];
let currentInstructor = "";
let globalExamsData = [];
const totalQ = 26;
const ALLOWED_CATEGORIES = [
  "autostrazi",
  "depasire",
  "oprire",
  "stationare",
  "semafoare",
  "ferata",
  "preventiva",
  "marcaje",
  "indicatoare",
  "viteza",
  "giratoriu",
  "prioritate",
  "drum"
];
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playClick() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

document.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !document.getElementById('screen-login').classList.contains('hidden')) { playClick(); auth(); } });

function triggerError(id) {
    const el = document.getElementById(id);

    // 🔴 RESET ANIMAȚIE
    el.classList.remove('shake-effect');
    void el.offsetWidth;
    el.classList.add('shake-effect');

    // 🔴 VIBRAȚIE (pattern mai realist)
    if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100]); // 🔥 vibrație dublă
    }

    // 🔴 FLASH ROȘU (bonus)
    el.style.boxShadow = "0 0 20px red";

    setTimeout(() => {
        el.classList.remove('shake-effect');
        el.style.boxShadow = "";
    }, 300);
}

function shuffle(a) { return a.sort(() => Math.random() - 0.5); }
function pick(l, n) { return shuffle([...l]).slice(0, n); }

async function fetchSettings() { try { const r = await fetch(`${DB_URL}settings.json`); return await r.json() || { adminCode: "999" }; } catch (e) { return { adminCode: "999" }; } }
async function fetchAccounts() { try { const r = await fetch(`${DB_URL}accounts.json`); return await r.json() || {}; } catch(e){ return {}; } }
async function syncExamToCloud(d) { try { await fetch(`${DB_URL}exams.json`, { method: 'POST', body: JSON.stringify(d) }); } catch(e){} }
async function fetchRawExams() { try { const r = await fetch(`${DB_URL}exams.json`); return await r.json(); } catch(e){return null;} }
async function loadUsed() {
    try {
        const r = await fetch(`${DB_URL}used.json`);
        return await r.json() || [];
    } catch {
        return [];
    }
}

async function saveUsed(data) {
    await fetch(`${DB_URL}used.json`, {
        method: 'PUT',
        body: JSON.stringify(data)
    });
}
async function fetchQuestions() {
    try {
        const r = await fetch(`${DB_URL}pool.json`);
        const d = await r.json();

        if (!d) return false;

        // 🔥 IMPORTANT: păstrăm ID-ul Firebase
        initialPool = Object.entries(d).map(([id, val]) => ({
            id,
            ...val
        }));

        return initialPool.length > 0;

    } catch (e) { 
        return false; 
    }
}

async function auth() {
    const name = document.getElementById('stu-name').value.trim(),
          code = document.getElementById('stu-code').value.trim(),
          s = await fetchSettings();
     const instructorCode = document.getElementById('admin-code')?.value.trim();

if(instructorCode === "999") {
    isBoss = true;
    alert("ADMIN BOSS");
    showAdmin();
    loadAdminList(); // 🔴 ASTA LIPSEA
    return;
}

    const accs = await fetchAccounts();
  const found = Object.values(accs).find(x => x.u === name && x.p === code);
 
if(!found) { 
    alert("Date incorecte!"); 
    return; 
}

isBoss = false;

// 🔴 INSTRUCTOR = NU are owner
if (!("owner" in found)) {
    currentInstructor = found.u;
    loadAdminList();
    showAdmin();
    return;
}
   const ok = await fetchQuestions();
    
    if(!ok) return alert("Eroare date!");

    const p = initialPool.filter(x => x && x.q && x.a && x.b && x.c && x.ans);

    const norm = (txt) => (txt || "").toLowerCase().trim();;

   usedGlobal = await loadUsed();
const imgAll = initialPool.filter(x => norm(x.cat || "").includes("imagini") && x.img);
let freshImg = imgAll.filter(x => !usedGlobal.includes(x.id));

if (freshImg.length < 10) {
    freshImg = imgAll; // 🔴 NU mai resetăm usedGlobal
}
// salvare DOAR imagini
await saveUsed(usedGlobal);

let nonImg = initialPool.filter(x => 
    !norm(x.cat || "").includes("imagini") &&
    !usedGlobal.includes(x.id)
);

let final = [];
console.log("FINAL INIT OK");
// 🔒 FIXE (NU INTRĂ ÎN RANDOM)
const infr = nonImg.filter(x => norm(x.cat).includes("inf"));
const contr = nonImg.filter(x => norm(x.cat).includes("cont"));
const mec = nonImg.filter(x => norm(x.cat).includes("mec"));
const prim = nonImg.filter(x => norm(x.cat).includes("prim"));

// 🎯 RANDOM DOAR DIN ASTEA
const randomPool = nonImg.filter(x => {
    const c = norm(x.cat);
    return (
        c.includes("aut") ||
        c.includes("dep") ||
        c.includes("opr") || c.includes("stat") ||
        c.includes("sem") ||
        c.includes("fer") ||
        c.includes("prev") ||
        c.includes("marc") ||
        c.includes("ind") ||
        c.includes("prior") || c.includes("gir") ||
        c.includes("vite") || c.includes("drum")
    );
});

// 🔥 FIXE
// 🔥 IMAGINI (10)
let selectedImg = pick(imgAll, 10);
final.push(...selectedImg);

usedGlobal.push(...selectedImg.map(x => x.id));
await saveUsed(usedGlobal);
final.push(...pick(mec.length ? mec : nonImg, 2));
final.push(...pick(prim.length ? prim : nonImg, 1));
final.push(...pick(contr.length ? contr : nonImg, 2));
final.push(...pick(infr.length ? infr : nonImg, 1));

// 🔥 RANDOM (COMPLETARE PÂNĂ LA 26)
let remaining = randomPool.filter(x => !final.some(f => f.id === x.id));
final.push(...pick(remaining, 26 - final.length));

// 🔥 ELIMINARE DUPLICATE
final = final.filter((v, i, a) => a.findIndex(x => x.id === v.id) === i);

// 🔥 FIX RĂSPUNSURI (EXACT CERINȚA TA)
const countAns = q => q.ans.replace(/\s/g, '').length;

// scoate toate 2 și 3
let keep2 = [];
let keep3 = null;

final = final.filter(q => {
    let c = countAns(q);

    if (c === 2 && keep2.length < 2) {
        keep2.push(q);
        return false;
    }

    if (c === 3 && !keep3) {
        keep3 = q;
        return false;
    }

    return c !== 2 && c !== 3;
});

// adaugă fix cerința
if (keep2.length < 2) {
    let extra = nonImg.filter(x => countAns(x) === 2 && !final.some(f => f.id === x.id));
    keep2.push(...pick(extra, 2 - keep2.length));
}

if (!keep3) {
    keep3 = nonImg.find(x => countAns(x) === 3 && !final.some(f => f.id === x.id));
}

if (keep3) final.push(keep3);

// 🔥 FINAL
final = shuffle(final).slice(0, 26);
    if (final.length < 26) {
    let remaining = nonImg.filter(x => {
    const c = norm(x.cat);
    return ALLOWED_CATEGORIES.some(k => c.includes(k)) && !final.some(f => f.id === x.id);
});
    final.push(...pick(remaining, 26 - final.length));
}

    final = shuffle(final).slice(0, 26);
    console.log("FINAL LENGTH:", final.length);
    studentName = name;
    activePool = final;

    qIndex = 0;

    document.getElementById('screen-login').classList.add('hidden');
    document.getElementById('screen-exam').classList.remove('hidden');
    document.getElementById('user-tag').innerText = "Cursant: " + name;

    startTimer();
    loadQ();
}

async function loadQ() {
   if(qIndex >= totalQ) {

    let nonImgUsed = final.filter(x => !x.img).map(x => x.id);

    usedGlobal.push(...nonImgUsed);
    await saveUsed(usedGlobal);

    const m = cor >= 22 
        ? `✔ ADMIS!\n\nSCOR FINAL: ${cor}` 
        : `✖ RESPINS!\n\nSCOR FINAL: ${cor}`;

    finalize(m);
    return;
}
    isPaused = false; sel = [];
    const btn = document.getElementById('btn-main'), q = activePool[0], imgWrap = document.getElementById('img-wrap');
    btn.innerText = "CONFIRMĂ"; btn.style.background = "var(--primary)";
    if(q.img && q.img !== "") { imgWrap.innerHTML = `<img src="${q.img}">`; imgWrap.style.display = "block"; } else { imgWrap.style.display = "none"; }
    qIndex++;

document.getElementById('q-text').innerText = qIndex + ". " + q.q;
    const list = document.getElementById('opts-list'); list.innerHTML = "";
    ['A','B','C'].forEach(l => {
        let b = document.createElement('button'); b.className = "opt-btn";
        b.innerHTML = `<span>${l}.</span> ${q[l.toLowerCase()]}`;
        b.onclick = () => { if(!isPaused) { playClick(); b.classList.toggle('selected'); if(sel.includes(l)) sel = sel.filter(x => x !== l); else sel.push(l); } };
        list.appendChild(b);
    });
    updateStats();
}

function handleAction() {
    if(isPaused) { activePool.shift(); loadQ(); return; }
    if(sel.length === 0) return alert("Alege un răspuns!");
    const q = activePool[0], pAns = sel.sort().join(""), cAns = q.ans.toString().replace(/\s/g, '').toUpperCase(), isOk = (pAns === cAns);
    document.querySelectorAll('.opt-btn').forEach(b => {
        const l = b.innerText.charAt(0);
        if(cAns.includes(l)) b.classList.add('correct'); else if(sel.includes(l)) b.classList.add('wrong');
    });
    if(!isOk) { 
        gre++; triggerError('q-card-main'); examHistory.push({q: q.q, r: pAns, c: cAns}); 
        if(gre >= 5) { setTimeout(() => finalize(`❌ RESPINS! ❌\n\nAI ACUMULAT 5 GREȘELI.\nAI AVUT ${cor} RĂSPUNSURI CORECTE.`), 500); return; } 
    } else { cor++; }
    isPaused = true; document.getElementById('btn-main').innerText = "MAI DEPARTE"; document.getElementById('btn-main').style.background = "var(--success)";
    updateStats();
if(qIndex >= totalQ) {
    setTimeout(() => {
        const m = cor >= 22 
            ? `✔ ADMIS!\n\nSCOR FINAL: ${cor}` 
            : `✖ RESPINS!\n\nSCOR FINAL: ${cor}`;
        finalize(m);
    }, 300);
    return;
}
}

function later() { 
    if(!isPaused && activePool.length > 1) { 
        activePool.push(activePool.shift()); 
        loadQ(); 
    } 
}
function updateStats() { document.getElementById('s-rem').innerText = activePool.length; document.getElementById('s-cor').innerText = cor; document.getElementById('s-gre').innerText = gre; document.getElementById('s-perc').innerText = Math.round((cor/totalQ)*100) + "%"; }
function startTimer() { let t = 1800; timer = setInterval(() => { let m = Math.floor(t/60), s = t%60; document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`; if(t-- <= 0) finalize(`❌ TIMP EXPIRAT! ❌\n\nRESPINS. SCOR FINAL: ${cor}`); }, 1000); }
async function finalize(m) { clearInterval(timer); await syncExamToCloud({ nume: studentName, scor: cor, greseli: gre, data: new Date().toLocaleString(), timp: document.getElementById('timer').innerText, detaliiGresele: examHistory }); alert(m); location.reload(); }

async function showAdmin() {
    document.getElementById('screen-login').classList.add('hidden');
    document.getElementById('screen-admin').classList.remove('hidden');
    if (!isBoss) {
    document.getElementById('new-adm-code').style.display = 'none';
    document.querySelector('button[onclick="updateCloudCodes()"]').style.display = 'none';
}
    const exitBtn = document.querySelector('button[onclick="location.reload()"]');

if (exitBtn) {
    exitBtn.innerText = isBoss ? "IEȘIRE ADMIN" : "IEȘIRE INSTRUCTOR";
}
if (!isBoss) document.querySelector('input[placeholder="Cod Nou Admin"]').closest('div').style.display = 'none';}

async function loadAdminList() {
const rawEx = await fetchRawExams();
globalExamsData = rawEx ? Object.keys(rawEx).map(k => ({...rawEx[k], fbKey: k})) : [];
    const rawAc = await fetchAccounts();
    console.log(rawAc);
    const container = document.getElementById('admin-grouped-content');

// 🔴 dacă NU e admin → e instructor
if (!isBoss) {

    let html = "";

    for (let id in rawAc) {
        let acc = rawAc[id];

        if (acc.owner && acc.owner.toLowerCase() === currentInstructor.toLowerCase()) {
      let testeElev = globalExamsData.filter(x => x.nume === acc.u);

let admise = testeElev.filter(x => x.scor >= 22).length;
let total = testeElev.length;

let procent = total ? Math.round((admise / total) * 100) : 0;

let medie = total ? (testeElev.reduce((a, b) => a + b.scor, 0) / total).toFixed(1) : 0;

html += `
<div class="admin-card-stu">

    <!-- CLICK PE NUME -->
    <div onclick="toggleElev('${acc.u.replace(/\s/g, '')}')" style="cursor:pointer;">

        <div style="font-weight:bold; color:var(--primary); font-size:18px;">
            ${acc.u}
        </div>

        <div style="font-size:10px; color:#64748b;">
            Parola: ${acc.p}
        </div>

    </div>

    <!-- BUTOANE -->
    <div style="position:absolute; top:10px; right:10px;">
        <span onclick="editStudent('${id}', '${acc.u}', '${acc.p}')" 
        style="cursor:pointer; margin-right:10px;">✏️</span>

        <span onclick="deleteAcc('${id}', '${acc.u}')" 
        style="cursor:pointer; color:red;">🗑️</span>
    </div>

    <!-- CONTINUT ASCUNS -->
    <div id="elev-${acc.u.replace(/\s/g, '')}" style="display:none;">

        <div class="results-grid">
            ${testeElev.map(function(ex, index) {
                return `
                    <div class="score-circle ${ex.scor < 22 ? 'circle-fail' : 'circle-pass'}"
                         onclick="toggleDetailsInstructor('${acc.u}', ${index})">
                        ${ex.scor}
                    </div>
                `;
            }).join('')}
        </div>

        <div class="gauges-row">
            <div class="gauge-col">
                <div class="gauge-visual">${medie}</div>
                <small>Media</small>
            </div>

            <div class="gauge-col">
                <div class="gauge-visual">${total}</div>
                <small>Teste</small>
            </div>

            <div class="gauge-col">
                <div class="gauge-visual">${procent}%</div>
                <small>Admis</small>
            </div>
        </div>

}async function editStudent(id, oldName, oldPass) {

    const newName = prompt("Nume elev nou:", oldName);
    if (!newName) return;

    const newPass = prompt("Parola nouă:", oldPass);
    if (!newPass) return;

    const rawAc = await fetchAccounts();

    const owner = rawAc[id].owner;

    rawAc[id].u = newName;
    rawAc[id].p = newPass;
    rawAc[id].owner = owner;

    await fetch(`${DB_URL}accounts/${id}.json`, {
        method: 'PUT',
        body: JSON.stringify(rawAc[id])
    });

    alert("Elev actualizat!");
    loadAdminList();
}


async function addNewAccount() {
    const u = prompt("Nume:");
    const p = prompt("Parola:");

    if (u && p) {

        // 🔴 dacă e ADMIN → creează instructor
        if (isBoss) {
            await fetch(`${DB_URL}accounts.json`, {
                method: 'POST',
                body: JSON.stringify({
                    u: u,
                    p: p
                })
            });
        }

        // 🔴 dacă e INSTRUCTOR → creează elev
        else {
            await fetch(`${DB_URL}accounts.json`, {
                method: 'POST',
                body: JSON.stringify({
                    u: u,
                    p: p,
                    owner: currentInstructor
                })
            });
        }

        loadAdminList();
    }
}

function toggleList(id) {
    const el = document.getElementById(id);
    if (el) {
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }
}
function toggleElev(id) {
    const el = document.getElementById("elev-" + id);
    if (el) {
        el.style.display = el.style.display === "none" ? "block" : "none";
    }
}
async function deleteAcc(id, name) {

    if (!confirm("Sigur vrei să ștergi " + name + "?")) return;

    const rawAc = await fetchAccounts();

    const acc = rawAc[id];

    // 🔴 dacă e instructor → șterge și elevii lui
    if (!acc.owner) {
        for (let key in rawAc) {
            if (rawAc[key].owner === acc.u) {
                await fetch(`${DB_URL}accounts/${key}.json`, {
                    method: 'DELETE'
                });
            }
        }
    }

    // 🔴 șterge contul
    await fetch(`${DB_URL}accounts/${id}.json`, {
        method: 'DELETE'
    });

loadAdminList();
}

// 🔥 AICI, continuare după acoladă
async function editInstructor(id, oldName, oldPass) {

    const newName = prompt("Nume nou:", oldName);
    if (!newName) return;

    const newPass = prompt("Parola nouă:", oldPass);
    if (!newPass) return;

    const rawAc = await fetchAccounts();

    for (let key in rawAc) {

        if (key === id) {
            rawAc[key].u = newName;
            rawAc[key].p = newPass;

            await fetch(`${DB_URL}accounts/${key}.json`, {
                method: 'PUT',
                body: JSON.stringify(rawAc[key])
            });
        }

        if (rawAc[key].owner === oldName) {
            rawAc[key].owner = newName;

            await fetch(`${DB_URL}accounts/${key}.json`, {
                method: 'PUT',
                body: JSON.stringify(rawAc[key])
            });
        }
    }

    alert("Instructor actualizat!");
    loadAdminList();
}

function toggleDetails(sID, idx, realName) {
    const box = document.getElementById(`err-${sID}`), filtered = globalExamsData.filter(x => x.nume === realName), ex = filtered[idx];
    if(!ex.detaliiGresele || ex.detaliiGresele.length === 0) box.innerHTML = "<div style='color:green; font-weight:bold;'>✅ Fără greșeli!</div>";
    else box.innerHTML = ex.detaliiGresele.map(g => `<div style="padding:5px; border-bottom:1px solid #eee; text-align:left; font-size:11px;"><b>Q:</b> ${g.q}<br><span style="color:red">R: ${g.r}</span> | <span style="color:green">C: ${g.c}</span></div>`).join('');
    box.classList.toggle('hidden');
}
function toggleDetailsInstructor(numeElev, index) {

    const safeId = numeElev.replace(/\s/g, "");
    const box = document.getElementById("err-" + safeId);

    const testeElev = globalExamsData.filter(x => x.nume === numeElev);
    const ex = testeElev[index];

    if (!box) return;

    if (!ex || !ex.detaliiGresele || ex.detaliiGresele.length === 0) {
        box.innerHTML = "<div style='color:green; font-weight:bold;'>✅ Fără greșeli!</div>";
    } else {
        box.innerHTML = ex.detaliiGresele.map(function(g) {
            return "<div style='padding:5px; border-bottom:1px solid #eee; font-size:11px;'>" +
                   "<b>Q:</b> " + g.q + "<br>" +
                   "<span style='color:red'>R: " + g.r + "</span> | " +
                   "<span style='color:green'>C: " + g.c + "</span>" +
                   "</div>";
        }).join('');
    }

    box.classList.toggle("hidden");
}
