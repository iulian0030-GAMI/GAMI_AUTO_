<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMI AUTO DRIVE</title>

<style>
body{margin:0;font-family:Arial;background:#1e3a8a;color:white}
.hidden{display:none}

/* LOGIN */
.login{height:100vh;display:flex;justify-content:center;align-items:center}
.card{background:white;color:black;padding:20px;border-radius:15px;width:300px;text-align:center}
input{width:100%;padding:10px;margin:10px 0}
button{padding:10px;width:100%}

/* PANEL */
.panel{padding:10px}
.item{background:white;color:black;margin:10px;padding:10px;border-radius:10px;position:relative}
.del{position:absolute;right:5px;top:5px;cursor:pointer}

/* EXAM */
.header{display:flex;justify-content:space-between;background:#0f172a;padding:10px}
.stats{display:flex;justify-content:space-around;background:white;color:black}
.q{background:white;color:black;margin:10px;padding:15px;border-radius:10px}
.opt{width:100%;padding:10px;margin:5px 0}
.footer{position:fixed;bottom:0;width:100%;display:flex}
.footer button{flex:1}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
<div class="card">
<h2>LOGIN</h2>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">INTRĂ</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden panel">
<h2>ADMIN</h2>
<button onclick="addInstructor()">+</button>
<div id="adminList"></div>
</div>

<!-- INSTRUCTOR -->
<div id="instr" class="hidden panel">
<h2>INSTRUCTOR</h2>
<button onclick="addStudent()">+</button>
<div id="studList"></div>
</div>

<!-- STUDENT / EXAM -->
<div id="exam" class="hidden">
<div class="header">
<div id="userTag"></div>
<div id="timer">30:00</div>
</div>

<div class="stats">
<div>Corecte: <span id="cor">0</span></div>
<div>Greșeli: <span id="gre">0</span></div>
</div>

<div class="q">
<div id="qText"></div>
<div id="opts"></div>
</div>

<div class="footer">
<button onclick="location.reload()">IEȘIRE</button>
<button onclick="answer()">CONFIRMĂ</button>
</div>
</div>

<script>

const DB="https://gamiautodrive-default-rtdb.europe-west1.firebasedatabase.app/";

let data={instructors:[]};
let role="",currentI=null,currentS=null;

/* LOAD */
async function load(){
let r=await fetch(DB+"data.json");
let d=await r.json();
if(d) data=d;
renderAdmin();
}
load();

/* SAVE */
function save(){
fetch(DB+"data.json",{method:"PUT",body:JSON.stringify(data)});
}

/* LOGIN */
function login(){
let u=user.value,p=pass.value;

if(p==="999"){
role="admin";
show("admin");
renderAdmin();
return;
}

let inst=data.instructors.find(i=>i.name===u && i.pass===p);
if(inst){
role="instr";currentI=inst;
show("instr");
renderInstr();
return;
}

for(let i of data.instructors){
let s=i.students.find(s=>s.name===u && s.pass===p);
if(s){
role="stud";currentS=s;currentI=i;
startExam();
return;
}
}

alert("Greșit");
}

/* SHOW */
function show(x){
login.style.display="none";
admin.classList.add("hidden");
instr.classList.add("hidden");
exam.classList.add("hidden");
document.getElementById(x).classList.remove("hidden");
}

/* ADMIN */
function renderAdmin(){
let div=adminList;div.innerHTML="";
data.instructors.forEach((i,ix)=>{
div.innerHTML+=`
<div class="item">
<div class="del" onclick="delI(${ix})">🗑</div>
<b onclick="toggle(${ix})">${i.name}</b>
<div id="i${ix}" class="hidden"></div>
</div>`;
});
}

function toggle(i){
let d=document.getElementById("i"+i);
d.classList.toggle("hidden");
d.innerHTML="";
data.instructors[i].students.forEach((s,j)=>{
d.innerHTML+=`
<div class="item">
<div class="del" onclick="delS(${i},${j})">🗑</div>
${s.name}
</div>`;
});
}

function addInstructor(){
let n=prompt("nume"),p=prompt("parola");
data.instructors.push({name:n,pass:p,students:[]});
save();renderAdmin();
}

function delI(i){
if(confirm("ștergi instructor?")){
data.instructors.splice(i,1);
save();renderAdmin();
}
}

function delS(i,j){
if(confirm("ștergi elev?")){
data.instructors[i].students.splice(j,1);
save();renderAdmin();
}
}

/* INSTRUCTOR */
function renderInstr(){
let d=studList;d.innerHTML="";
currentI.students.forEach((s,i)=>{
d.innerHTML+=`
<div class="item">
<div class="del" onclick="delStud(${i})">🗑</div>
<b onclick="hist(${i})">${s.name}</b>
<div id="h${i}" class="hidden"></div>
</div>`;
});
}

function addStudent(){
let n=prompt("nume"),p=prompt("parola");
currentI.students.push({name:n,pass:p,history:[]});
save();renderInstr();
}

function delStud(i){
if(confirm("ștergi elev?")){
currentI.students.splice(i,1);
save();renderInstr();
}
}

function hist(i){
let d=document.getElementById("h"+i);
d.classList.toggle("hidden");
d.innerHTML="";
currentI.students[i].history.forEach(h=>{
d.innerHTML+=`
<div class="item">
Scor:${h.cor} Greșeli:${h.gre}
</div>`;
});
}

/* EXAM */
let cor=0,gre=0,time=1800,t;

function startExam(){
show("exam");
userTag.innerText=currentS.name;
cor=0;gre=0;time=1800;

t=setInterval(()=>{
time--;
let m=Math.floor(time/60),s=time%60;
timer.innerText=m+":"+(s<10?"0":"")+s;
if(time<=0)finish();
},1000);

nextQ();
}

function nextQ(){
if(gre>=5||cor+gre>=26)return finish();

qText.innerText="Întrebare";
opts.innerHTML="";
["A","B","C"].forEach(a=>{
let b=document.createElement("button");
b.className="opt";
b.innerText=a;
b.onclick=()=>check();
opts.appendChild(b);
});
}

function check(){
if(Math.random()<0.5)cor++;else gre++;
document.getElementById("cor").innerText=cor;
document.getElementById("gre").innerText=gre;
nextQ();
}

function answer(){}

function finish(){
clearInterval(t);

currentS.history.push({cor,gre});
save();

if(cor>=22)alert("ADMIS "+cor);
else alert("RESPINS "+cor);

location.reload();
}

</script>

</body>
</html>
